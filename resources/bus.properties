# ── Broker seçimi ──────────────────────────────────────────────
# Geçerli değerler: kafka | rabbit | redpanda
bus.broker=rabbit

# ── Servis adı ─────────────────────────────────────────────────
# Envelope içinde source tutuyorum. Bu alan gereksiz olabilir.
bus.serviceName=app

# ── Redpanda ───────────────────────────────────────────────────
bus.redpanda.bootstrap=localhost:19092
bus.redpanda.groupId=troia-group

# ── Kafka ──────────────────────────────────────────────────────
bus.kafka.bootstrap=localhost:9092
bus.kafka.groupId=troia-group

# ── RabbitMQ ───────────────────────────────────────────────────
bus.rabbit.host=localhost
bus.rabbit.port=5672
bus.rabbit.user=guest
bus.rabbit.pass=guest
bus.rabbit.vhost=/